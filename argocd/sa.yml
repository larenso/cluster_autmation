apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd-deployer
  namespace: valkey
  labels:
    app.kubernetes.io/name: argocd-application-controller
    app.kubernetes.io/component: application-controller
    app.kubernetes.io/part-of: argocd
    app.kubernetes.io/managed-by: yaml
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argocd-deployer-role
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-application-controller
    app.kubernetes.io/component: application-controller
    app.kubernetes.io/part-of: argocd
    app.kubernetes.io/managed-by: yaml
rules:
- apiGroups: [""]
  resources: ["secrets", "configmaps", "services", "persistentvolumeclaims", "bindings", "serviceaccounts"]
  verbs:     ["get", "patch"]
# - apiGroups: [""]
#   resources: ["events"]
#   verbs:     ["create"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs:     ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argocd-deployer-binding
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-application-controller
    app.kubernetes.io/component: application-controller
    app.kubernetes.io/part-of: argocd
    app.kubernetes.io/managed-by: yaml
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argocd-deployer-role
subjects:
- kind: ServiceAccount
  name: argocd-deployer
  namespace: argocd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argocd-watch-role
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-application-controller
    app.kubernetes.io/component: application-controller
    app.kubernetes.io/part-of: argocd
    app.kubernetes.io/managed-by: yaml
rules:
- apiGroups: ["*"]
  resources: ["*"]
  verbs:     ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["events"]
  verbs:     ["list", "create"]
- apiGroups:     [""]
  resources:     ["serviceaccounts"]
  resourceNames: ["argocd-deployer"]
  verbs:         ["impersonate"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argocd-watch-binding
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-application-controller
    app.kubernetes.io/component: application-controller
    app.kubernetes.io/part-of: argocd
    app.kubernetes.io/managed-by: yaml
subjects:
- kind: ServiceAccount
  name: argocd-application-controller
  namespace: argocd
roleRef:
  kind: Role
  name: argocd-watch-role
  apiGroup: rbac.authorization.k8s.io
