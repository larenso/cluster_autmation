apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-sa
spec:
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  sources:
  - repoURL: git@github.com:larenso/cluster_autmation.git
    targetRevision: main
    path: argocd/sa
  project: argo
  syncPolicy:
    automated: null
    syncOptions:
    - RespectIgnoreDifferences=true
    - ApplyOutOfSyncOnly=true
